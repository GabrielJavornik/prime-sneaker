<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha - Prime Sneaker</title>
    <link rel="stylesheet" href="css/style.css?v=31" />
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="card-form">
            <h2>Redefinir Senha</h2>
            <div id="alert-area"></div>

            <div id="form-container" style="display: none;">
                <form id="reset-form">
                    <div class="form-group">
                        <label>Nova Senha</label>
                        <input type="password" id="password" required minlength="8" />
                    </div>
                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="confirm-password" placeholder="Confirme a nova senha" required minlength="8" />
                    </div>
                    <button type="submit" class="btn-primary">Redefinir Senha</button>
                    <p class="form-footer">
                        <a href="login.html">Voltar ao login</a>
                    </p>
                </form>
            </div>

            <div id="loading" style="text-align: center;">
                <p>Validando link...</p>
            </div>

            <div id="success-message" style="display: none; text-align: center;">
                <div class="alert alert-success">
                    Senha redefinida com sucesso!
                </div>
                <p style="margin-top: 1rem;">
                    <a href="login.html" class="btn-primary" style="display: inline-block; padding: 0.5rem 1.5rem;">Ir para Login</a>
                </p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/notifications.js?v=2"></script>
    <script src="js/cart-storage.js"></script>
    <script src="js/cart.js?v=5"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js?v=18"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const formContainer = document.getElementById('form-container');
        const loading = document.getElementById('loading');
        const alertArea = document.getElementById('alert-area');
        const successMsg = document.getElementById('success-message');

        async function verifyToken() {
            if (!token) {
                alertArea.innerHTML = '<div class="alert alert-error">Token não fornecido. Link inválido.</div>';
                loading.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`/api/verify-reset-token/${token}`);
                const data = await response.json();

                if (response.ok && data.valid) {
                    loading.style.display = 'none';
                    formContainer.style.display = 'block';
                } else {
                    alertArea.innerHTML = '<div class="alert alert-error">Link expirado ou inválido. Solicite um novo link de recuperação.</div>';
                    loading.style.display = 'none';
                }
            } catch (err) {
                alertArea.innerHTML = '<div class="alert alert-error">Erro ao validar link: ' + err.message + '</div>';
                loading.style.display = 'none';
            }
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.currentTarget;
            const submitButton = form.querySelector('button[type="submit"]');
            const originalText = submitButton ? submitButton.textContent : '';
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            let shouldRestoreButton = true;

            if (password !== confirmPassword) {
                alertArea.innerHTML = '<div class="alert alert-error">As senhas não coincidem</div>';
                return;
            }

            const passwordError = getStrongPasswordError(password);
            if (passwordError) {
                alertArea.innerHTML = `<div class="alert alert-error">${escapeHTML(passwordError)}</div>`;
                return;
            }

            if (submitButton) {
                submitButton.disabled = true;
                submitButton.textContent = 'Redefinindo...';
            }

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    formContainer.style.display = 'none';
                    successMsg.style.display = 'block';
                    shouldRestoreButton = false;
                } else {
                    alertArea.innerHTML = `<div class="alert alert-error">${escapeHTML(data.error || 'Erro ao redefinir senha')}</div>`;
                }
            } catch (err) {
                alertArea.innerHTML = `<div class="alert alert-error">Erro: ${escapeHTML(err.message)}</div>`;
            } finally {
                if (shouldRestoreButton && submitButton) {
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            }
        });

        verifyToken();
    </script>
</body>
</html>
