<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Prime Sneaker</title>
    <link rel="stylesheet" href="css/style.css?v=32" />
    <style>
        .register-name-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .register-address-section {
            margin: 1.5rem 0;
            padding: 1.25rem;
            border: 1px solid #dbe3ef;
            border-radius: 18px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
        }

        .register-address-section h3 {
            margin: 0 0 .35rem;
            font-size: 1.2rem;
            color: #111827;
        }

        .register-address-note {
            margin: 0 0 1rem;
            color: #52657f;
            font-size: .95rem;
        }

        .register-address-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .register-address-grid .is-full {
            grid-column: 1 / -1;
        }

        .register-cep-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 1rem;
            align-items: end;
        }

        .register-cep-help {
            align-self: center;
            color: #111827;
            font-weight: 800;
            text-decoration: underline;
            white-space: nowrap;
        }

        .register-address-feedback {
            min-height: 1.25rem;
            margin: -.25rem 0 .75rem;
            color: #52657f;
            font-size: .9rem;
            font-weight: 700;
        }

        .register-address-feedback.is-error {
            color: #b91c1c;
        }

        .register-address-feedback.is-success {
            color: #15803d;
        }

        @media (max-width: 640px) {
            .register-name-grid,
            .register-address-grid,
            .register-cep-row {
                grid-template-columns: 1fr;
            }

            .register-cep-help {
                justify-self: start;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="card-form">
            <h2>Criar Conta</h2>
            <div id="alert-area"></div>
            <form id="register-form">
                <div class="register-name-grid">
                    <div class="form-group">
                        <label for="first-name">Nome</label>
                        <input type="text" id="first-name" autocomplete="given-name" required />
                    </div>
                    <div class="form-group">
                        <label for="last-name">Sobrenome</label>
                        <input type="text" id="last-name" autocomplete="family-name" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required />
                </div>
                <div class="form-group">
                    <label for="phone">Telefone</label>
                    <input type="tel" id="phone" placeholder="(00) 00000-0000" required />
                </div>
                <section class="register-address-section" aria-labelledby="register-address-title">
                    <h3 id="register-address-title">Endereço principal</h3>
                    <p class="register-address-note">
                        O endereço principal também será salvo como endereço de cobrança e entrega.
                    </p>
                    <div class="register-cep-row">
                        <div class="form-group">
                            <label for="register-cep">CEP</label>
                            <input
                                type="text"
                                id="register-cep"
                                placeholder="00000-000"
                                autocomplete="postal-code"
                                maxlength="9"
                                required
                            />
                        </div>
                        <a
                            class="register-cep-help"
                            href="https://buscacepinter.correios.com.br/app/endereco/index.php"
                            target="_blank"
                            rel="noopener"
                        >Não sei meu CEP</a>
                    </div>
                    <div id="register-address-feedback" class="register-address-feedback" aria-live="polite"></div>
                    <div class="register-address-grid">
                        <div class="form-group is-full">
                            <label for="register-street">Endereço</label>
                            <input type="text" id="register-street" autocomplete="address-line1" required />
                        </div>
                        <div class="form-group">
                            <label for="register-number">Número</label>
                            <input type="text" id="register-number" autocomplete="address-line2" required />
                        </div>
                        <div class="form-group">
                            <label for="register-complement">Complemento</label>
                            <input type="text" id="register-complement" autocomplete="address-line3" />
                        </div>
                        <div class="form-group is-full">
                            <label for="register-neighborhood">Bairro</label>
                            <input type="text" id="register-neighborhood" required />
                        </div>
                        <div class="form-group">
                            <label for="register-city">Cidade</label>
                            <input type="text" id="register-city" autocomplete="address-level2" required />
                        </div>
                        <div class="form-group">
                            <label for="register-state">Estado</label>
                            <input type="text" id="register-state" autocomplete="address-level1" maxlength="2" required />
                        </div>
                    </div>
                </section>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required minlength="8" />
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar senha</label>
                    <input type="password" id="confirm-password" required minlength="8" />
                </div>
                <button type="submit" class="btn-primary">Cadastrar</button>
                <p class="form-footer">
                    Já tem conta? <a href="login.html">Fazer login</a>
                </p>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/notifications.js?v=3"></script>
    <script src="js/cart-storage.js"></script>
    <script src="js/cart.js?v=5"></script>
    <script src="js/api.js?v=8"></script>
    <script src="js/common.js?v=23"></script>
    <script>
        const registerCepInput = document.getElementById('register-cep');
        const registerAddressFeedback = document.getElementById('register-address-feedback');
        let registerCepTimeout;

        function setRegisterAddressFeedback(message = '', type = 'info') {
            if (!registerAddressFeedback) return;
            registerAddressFeedback.textContent = message;
            registerAddressFeedback.classList.toggle('is-error', type === 'error');
            registerAddressFeedback.classList.toggle('is-success', type === 'success');
        }

        function formatCep(value) {
            const digits = String(value || '').replace(/\D/g, '').slice(0, 8);
            if (digits.length > 5) {
                return digits.replace(/^(\d{5})(\d{0,3}).*/, '$1-$2');
            }
            return digits;
        }

        function getRegisterAddressData() {
            return {
                cep: document.getElementById('register-cep').value.trim(),
                street: document.getElementById('register-street').value.trim(),
                number: document.getElementById('register-number').value.trim(),
                complement: document.getElementById('register-complement').value.trim() || null,
                neighborhood: document.getElementById('register-neighborhood').value.trim(),
                city: document.getElementById('register-city').value.trim(),
                state: document.getElementById('register-state').value.trim().toUpperCase(),
                country: 'Brasil',
            };
        }

        function getRegisterAddressError(addressData) {
            const cepDigits = addressData.cep.replace(/\D/g, '');
            if (cepDigits.length !== 8) return 'Informe um CEP válido.';
            if (!addressData.street) return 'Informe o endereço.';
            if (!addressData.number) return 'Informe o número.';
            if (!addressData.neighborhood) return 'Informe o bairro.';
            if (!addressData.city) return 'Informe a cidade.';
            if (!addressData.state || addressData.state.length !== 2) return 'Informe o estado com 2 letras.';
            return '';
        }

        async function fetchRegisterAddressByCep(cepValue) {
            const cep = String(cepValue || '').replace(/\D/g, '');
            if (cep.length !== 8) return;

            setRegisterAddressFeedback('Buscando endereço...');
            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();

                if (!response.ok || data.erro) {
                    setRegisterAddressFeedback('CEP não encontrado. Confira o número digitado.', 'error');
                    return;
                }

                document.getElementById('register-street').value = data.logradouro || '';
                document.getElementById('register-neighborhood').value = data.bairro || '';
                document.getElementById('register-city').value = data.localidade || '';
                document.getElementById('register-state').value = data.uf || '';
                setRegisterAddressFeedback('Endereço preenchido automaticamente. Complete o número.', 'success');
            } catch (err) {
                setRegisterAddressFeedback('Não foi possível buscar o CEP agora. Preencha o endereço manualmente.', 'error');
            }
        }

        async function saveInitialAddresses(addressData) {
            await API.createAddress({
                ...addressData,
                type: 'billing',
                isDefault: false,
            });
            await API.createAddress({
                ...addressData,
                type: 'delivery',
                isDefault: true,
            });
        }

        if (registerCepInput) {
            registerCepInput.addEventListener('input', (e) => {
                e.target.value = formatCep(e.target.value);
                setRegisterAddressFeedback('');
                clearTimeout(registerCepTimeout);
                const cepDigits = e.target.value.replace(/\D/g, '');
                if (cepDigits.length === 8) {
                    registerCepTimeout = setTimeout(() => fetchRegisterAddressByCep(cepDigits), 350);
                }
            });

            registerCepInput.addEventListener('blur', () => {
                const cepDigits = registerCepInput.value.replace(/\D/g, '');
                if (cepDigits.length === 8) {
                    fetchRegisterAddressByCep(cepDigits);
                }
            });
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.currentTarget;
            const submitButton = form.querySelector('button[type="submit"]');
            const originalText = submitButton ? submitButton.textContent : '';
            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const name = `${firstName} ${lastName}`.replace(/\s+/g, ' ').trim();
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const alertArea = document.getElementById('alert-area');
            const addressData = getRegisterAddressData();
            let shouldRestoreButton = true;

            alertArea.innerHTML = '';

            if (!firstName || firstName.length < 2) {
                alertArea.innerHTML =
                    '<div class="alert alert-error">Informe seu nome.</div>';
                return;
            }

            if (!lastName || lastName.length < 2) {
                alertArea.innerHTML =
                    '<div class="alert alert-error">Informe seu sobrenome.</div>';
                return;
            }

            const phoneDigits = phone.replace(/\D/g, '');
            if (phoneDigits.length < 10 || phoneDigits.length > 11) {
                alertArea.innerHTML =
                    '<div class="alert alert-error">Telefone deve ter DDD e 10 ou 11 dígitos.</div>';
                return;
            }

            const addressError = getRegisterAddressError(addressData);
            if (addressError) {
                alertArea.innerHTML = `<div class="alert alert-error">${escapeHTML(addressError)}</div>`;
                return;
            }

            if (password !== confirmPassword) {
                alertArea.innerHTML =
                    '<div class="alert alert-error">As senhas nao correspondem.</div>';
                return;
            }

            const passwordError = getStrongPasswordError(password);
            if (passwordError) {
                alertArea.innerHTML = `<div class="alert alert-error">${escapeHTML(passwordError)}</div>`;
                return;
            }

            if (submitButton) {
                submitButton.disabled = true;
                submitButton.textContent = 'Cadastrando...';
            }

            try {
                const resp = await API.register(name, email, password, phone);
                sessionStorage.setItem('token', resp.token);
                sessionStorage.setItem('user', JSON.stringify(resp.user));
                await saveInitialAddresses(addressData);
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                if (typeof clearSharedCheckoutState === 'function') {
                    clearSharedCheckoutState();
                }
                if (typeof Cart !== 'undefined' && typeof Cart.mergeGuestCartToCurrentUser === 'function') {
                    await Cart.mergeGuestCartToCurrentUser();
                }
                toast('Cadastro realizado com sucesso!', 'success');
                shouldRestoreButton = false;
                setTimeout(() => window.location.href = 'index.html', 800);
            } catch (err) {
                alertArea.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            } finally {
                if (shouldRestoreButton && submitButton) {
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            }
        });

        document.getElementById('phone').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '').slice(0, 11);
            if (value.length > 10) {
                value = value.replace(/^(\d{2})(\d{5})(\d{0,4}).*/, '($1) $2-$3');
            } else if (value.length > 6) {
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
            } else if (value.length > 2) {
                value = value.replace(/^(\d{2})(\d{0,5}).*/, '($1) $2');
            } else if (value.length > 0) {
                value = value.replace(/^(\d{0,2}).*/, '($1');
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
