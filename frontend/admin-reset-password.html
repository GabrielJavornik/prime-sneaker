<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha Admin - Prime Sneaker</title>
    <link rel="stylesheet" href="css/style.css?v=32" />
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(214, 178, 62, 0.22), transparent 30%),
                linear-gradient(135deg, #060b16 0%, #111827 55%, #0f172a 100%);
            font-family: Bahnschrift, "Segoe UI Variable", "Segoe UI", sans-serif;
        }

        .admin-reset-card {
            width: min(520px, 100%);
            padding: 34px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .admin-reset-badge {
            display: inline-flex;
            padding: 9px 14px;
            border-radius: 999px;
            background: #0f172a;
            color: #d6b23e;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-size: 0.72rem;
            font-weight: 900;
            margin-bottom: 18px;
        }

        .admin-reset-card h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 6vw, 3rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
            color: #111827;
        }

        .admin-reset-card p {
            color: #64748b;
            line-height: 1.65;
            margin-bottom: 20px;
        }

        .admin-reset-form {
            display: none;
        }

        .admin-reset-form.is-visible {
            display: block;
        }

        .admin-reset-field {
            margin-bottom: 16px;
        }

        .admin-reset-field label {
            display: block;
            margin-bottom: 8px;
            color: #111827;
            font-weight: 900;
        }

        .admin-reset-field input {
            width: 100%;
            min-height: 56px;
            padding: 0 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 1rem;
            background: #fff;
        }

        .admin-reset-field input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        .admin-reset-btn {
            width: 100%;
            min-height: 56px;
            border: 0;
            border-radius: 16px;
            background: #d6b23e;
            color: #111827;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
        }

        .admin-reset-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .admin-reset-alert {
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 18px;
            border: 1px solid rgba(220, 38, 38, 0.2);
            background: rgba(220, 38, 38, 0.08);
            color: #991b1b;
            font-weight: 800;
            line-height: 1.45;
        }

        .admin-reset-alert.success {
            border-color: rgba(21, 128, 61, 0.22);
            background: rgba(21, 128, 61, 0.1);
            color: #15803d;
        }

        .admin-reset-loading {
            color: #64748b;
            font-weight: 800;
        }

        .admin-reset-link {
            display: inline-flex;
            margin-top: 18px;
            color: #1d4ed8;
            font-weight: 900;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="admin-reset-card">
        <div class="admin-reset-badge">Prime Sneaker Admin</div>
        <h1>Redefinir senha</h1>
        <p id="reset-copy">Validando o link de recuperação administrativa.</p>
        <div id="alert-area"></div>
        <div id="loading" class="admin-reset-loading">Validando link...</div>

        <form id="reset-form" class="admin-reset-form">
            <div class="admin-reset-field">
                <label for="password">Nova senha</label>
                <input type="password" id="password" required minlength="8" autocomplete="new-password" />
            </div>
            <div class="admin-reset-field">
                <label for="confirm-password">Confirmar senha</label>
                <input type="password" id="confirm-password" required minlength="8" autocomplete="new-password" />
            </div>
            <button type="submit" class="admin-reset-btn">Salvar nova senha</button>
        </form>

        <a href="admin-login.html" class="admin-reset-link">Voltar ao login admin</a>
    </main>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const alertArea = document.getElementById('alert-area');
        const loading = document.getElementById('loading');
        const resetForm = document.getElementById('reset-form');
        const resetCopy = document.getElementById('reset-copy');

        function setAlert(message, type = 'error') {
            alertArea.innerHTML = '';
            if (!message) return;
            const alert = document.createElement('div');
            alert.className = `admin-reset-alert ${type === 'success' ? 'success' : ''}`;
            alert.textContent = message;
            alertArea.appendChild(alert);
        }

        function getPasswordStrengthError(password) {
            const value = String(password || '');
            const normalized = value.toLowerCase();
            const digitsOnly = value.replace(/\D/g, '');
            const lettersOnly = normalized.replace(/[^a-z]/g, '');
            const commonPasswords = new Set(['123456', '12345678', '123456789', 'senha123', 'admin123', 'password123', 'prime123', 'tenis123']);

            if (value.length < 8) return 'Senha fraca. Use no minimo 8 caracteres, com letras e numeros.';
            if (!/[a-zA-Z]/.test(value) || !/\d/.test(value)) return 'Senha fraca. Use letras e numeros.';
            if (/^(.)\1+$/.test(value)) return 'Senha fraca. Evite repetir o mesmo caractere.';
            if (commonPasswords.has(normalized)) return 'Senha muito simples. Evite senhas obvias.';
            if ('0123456789'.includes(digitsOnly) || '9876543210'.includes(digitsOnly)) return 'Senha fraca. Evite sequencias.';
            if ('abcdefghijklmnopqrstuvwxyz'.includes(lettersOnly) || 'zyxwvutsrqponmlkjihgfedcba'.includes(lettersOnly)) return 'Senha fraca. Evite sequencias.';
            return null;
        }

        async function verifyToken() {
            if (!token) {
                loading.style.display = 'none';
                setAlert('Link invalido. Solicite uma nova recuperacao pelo login admin.');
                return;
            }

            try {
                const response = await fetch(`/api/admin/verify-reset-token?token=${encodeURIComponent(token)}`);
                const data = await response.json().catch(() => ({}));
                if (!response.ok || !data.valid) throw new Error(data.error || 'Token invalido ou expirado');

                loading.style.display = 'none';
                resetForm.classList.add('is-visible');
                resetCopy.textContent = `Crie uma nova senha para ${data.email}.`;
            } catch (err) {
                loading.style.display = 'none';
                setAlert(`${err.message || 'Link invalido ou expirado.'} Solicite um novo link no login admin.`);
            }
        }

        resetForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const submitButton = resetForm.querySelector('button[type="submit"]');
            const originalText = submitButton.textContent;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            setAlert('');
            if (password !== confirmPassword) {
                setAlert('As senhas nao coincidem.');
                return;
            }

            const passwordError = getPasswordStrengthError(password);
            if (passwordError) {
                setAlert(passwordError);
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = 'Salvando...';

            try {
                const response = await fetch('/api/admin/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password }),
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(data.error || 'Nao foi possivel redefinir a senha');

                resetForm.classList.remove('is-visible');
                resetCopy.textContent = 'Sua senha administrativa foi redefinida.';
                setAlert(data.message || 'Senha alterada com sucesso.', 'success');
            } catch (err) {
                setAlert(err.message || 'Nao foi possivel redefinir a senha.');
                submitButton.disabled = false;
                submitButton.textContent = originalText;
            }
        });

        verifyToken();
    </script>
</body>
</html>
