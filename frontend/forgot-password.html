<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha - Prime Sneaker</title>
    <link rel="stylesheet" href="css/style.css?v=31" />
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="card-form">
            <h2>Recuperar Senha</h2>
            <p style="color: var(--muted); margin-bottom: 1.5rem; text-align: center;">
                Digite seu email para receber um link de recuperação
            </p>
            <div id="alert-area"></div>
            <form id="forgot-form">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required />
                </div>
                <button type="submit" class="btn-primary">Enviar Link de Recuperação</button>
                <p class="form-footer">
                    Lembrou a senha? <a href="login.html">Voltar ao login</a>
                </p>
            </form>
            <div id="success-message" style="display: none; text-align: center;">
                <div class="alert alert-success">
                    Link de recuperação enviado para <strong id="sent-email"></strong>!
                </div>
                <p style="margin-top: 1rem; color: var(--muted);">
                    Verifique sua caixa de entrada (e a pasta de spam)
                </p>
                <p style="margin-top: 1.5rem; color: var(--muted); font-size: 0.9rem;">
                    Não recebeu o email?
                </p>
                <button type="button" id="resend-btn" class="btn-primary" style="margin-top: 0.5rem;">
                    Reenviar link
                </button>
                <p id="resend-status" style="margin-top: 0.75rem; font-size: 0.85rem; color: var(--muted);"></p>
                <p class="form-footer" style="margin-top: 1.5rem;">
                    <a href="login.html">Voltar ao login</a>
                </p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/notifications.js?v=2"></script>
    <script src="js/cart-storage.js"></script>
    <script src="js/cart.js?v=5"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js?v=18"></script>
    <script>
        let lastSentEmail = '';

        async function sendResetEmail(email) {
            const response = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email }),
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Erro ao enviar email');
            return data;
        }

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const alertArea = document.getElementById('alert-area');
            const form = document.getElementById('forgot-form');
            const submitButton = form.querySelector('button[type="submit"]');
            const originalText = submitButton ? submitButton.textContent : '';
            const successMsg = document.getElementById('success-message');
            let shouldRestoreButton = true;

            alertArea.innerHTML = '';
            if (submitButton) {
                submitButton.disabled = true;
                submitButton.textContent = 'Enviando...';
            }

            try {
                await sendResetEmail(email);
                lastSentEmail = email;
                document.getElementById('sent-email').textContent = email;
                form.style.display = 'none';
                successMsg.style.display = 'block';
                Notifications.success('Verifique seu email!');
                shouldRestoreButton = false;
            } catch (err) {
                alertArea.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
                Notifications.error(err.message);
            } finally {
                if (shouldRestoreButton && submitButton) {
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            }
        });

        document.getElementById('resend-btn').addEventListener('click', async () => {
            const btn = document.getElementById('resend-btn');
            const status = document.getElementById('resend-status');
            if (!lastSentEmail) return;

            btn.disabled = true;
            const originalText = btn.textContent;
            btn.textContent = 'Reenviando...';
            status.textContent = 'Reenviando...';
            status.style.color = 'var(--muted)';

            try {
                await sendResetEmail(lastSentEmail);
                Notifications.success('Email reenviado!');
                let secs = 30;
                status.textContent = `Email reenviado. Aguarde ${secs}s para reenviar novamente.`;
                const interval = setInterval(() => {
                    secs--;
                    if (secs <= 0) {
                        clearInterval(interval);
                        btn.disabled = false;
                        btn.textContent = originalText;
                        status.textContent = '';
                    } else {
                        status.textContent = `Email reenviado. Aguarde ${secs}s para reenviar novamente.`;
                    }
                }, 1000);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = originalText;
                status.textContent = err.message;
                status.style.color = 'var(--danger, #DC2626)';
                Notifications.error(err.message);
            }
        });
    </script>
</body>
</html>
