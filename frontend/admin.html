<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página Não Encontrada</title>
    <link rel="stylesheet" href="css/style.css?v=31" />
    <script>
        // Redirecionar para home após 2 segundos
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main style="text-align: center; padding: 4rem 2rem;">
        <h1 style="font-size: 4rem; color: var(--danger); margin-bottom: 1rem;">404</h1>
        <h2 style="color: var(--primary); margin-bottom: 1rem;">Página Não Encontrada</h2>
        <p style="color: var(--muted); margin-bottom: 2rem; font-size: 1.1rem;">
            Desculpe, a página que você está procurando não existe.
        </p>
        <p style="color: var(--muted); font-size: 0.95rem;">
            Você será redirecionado em alguns segundos...
        </p>
        <a href="index.html" class="btn-cta" style="display: inline-block; margin-top: 2rem; padding: 0.8rem 2rem; text-decoration: none;">
            Voltar para Home
        </a>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/notifications.js?v=2"></script>
    <script src="js/common.js?v=18"></script>
</body>
</html>
